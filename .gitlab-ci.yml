# ================================================================
# .gitlab-ci.yml — production-ready-ecs-app
#
# Trigger: Any commit on any branch
#
# Pipeline Stages:
#   1. validate  → Dockerfile & Python linting
#   2. test      → Unit tests & code coverage
#   3. quality   → SonarCloud code quality analysis
#   4. build     → Docker build & push to ECR
#   5. deploy    → Clone infrastructure repo & Terraform apply
#   6. verify    → Smoke tests & Datadog event notification
# ================================================================

# ── Global Variables ──────────────────────────────────────────
variables:
  AWS_REGION: "us-east-1"
  APP_NAME: "api"
  DOCKER_BUILDKIT: "1"
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"
  INFRA_REPO: "https://gitlab-ci-token:${INFRA_REPO_TOKEN}@gitlab.com/your-org/production-ready-ecs-infra.git"

  # Secure variables managed via GitLab CI/CD → Settings → CI/CD Variables:
  # AWS_ACCESS_KEY_ID          (masked)
  # AWS_SECRET_ACCESS_KEY      (masked)
  # DATADOG_API_KEY            (masked)
  # SONAR_TOKEN                (masked)
  # INFRA_REPO_TOKEN           (masked) <- Token for accessing the infrastructure repo

# ── Stages Declaration ────────────────────────────────────────
stages:
  - validate
  - test
  - quality
  - build
  - deploy
  - verify

# ── Reusable Templates ────────────────────────────────────────
.aws_configure: &aws_configure
  before_script:
    - aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
    - aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
    - aws configure set region $AWS_REGION
    - export ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
    - export ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
    - export ECR_REPO="${ECR_REGISTRY}/portfolio-ecs-dev/${APP_NAME}"


# ── STAGE 1: Validate ─────────────────────────────────────────


lint:dockerfile:
  stage: validate
  image: hadolint/hadolint:latest-alpine
  script:
    - hadolint app/Dockerfile
  rules:
    - changes:
        - app/Dockerfile

lint:python:
  stage: validate
  image: python:3.12-slim
  script:
    - pip install ruff --quiet
    - ruff check app/
  rules:
    - changes:
        - app/**/*.py


# ── STAGE 2: Test ─────────────────────────────────────────────


test:unit:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install -r app/requirements.txt pytest pytest-cov --quiet
  script:
    - cd app
    - python -m pytest tests/ \
        --junitxml=report.xml \
        --cov=. \
        --cov-report=xml:coverage.xml \
        --cov-report=term-missing \
        -v
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      junit: app/report.xml
      coverage_report:
        coverage_format: cobertura
        path: app/coverage.xml
    paths:
      - app/report.xml
      - app/coverage.xml
    expire_in: 7 days


# ── STAGE 3: Quality (SonarCloud) ──────────────────────────────

quality:sonarcloud:
  stage: quality
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: sonar-cache
    paths:
      - .sonar/cache
  script:
    - sonar-scanner \
        -Dsonar.host.url=https://sonarcloud.io \
        -Dsonar.token=${SONAR_TOKEN} \
        -Dsonar.qualitygate.wait=true
  dependencies:
    - test:unit
  allow_failure: false
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        SONAR_EXTRA_ARGS: >-
          -Dsonar.pullrequest.key=${CI_MERGE_REQUEST_IID}
          -Dsonar.pullrequest.branch=${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}
          -Dsonar.pullrequest.base=${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}
    - if: $CI_COMMIT_BRANCH

# ── STAGE 4: Build ────────────────────────────────────────────

build:docker:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: "tcp://docker:2376"
  <<: *aws_configure
  script:
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
    - |
      docker build \
        --cache-from "${ECR_REPO}:cache" \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --tag "${ECR_REPO}:${IMAGE_TAG}" \
        --tag "${ECR_REPO}:${CI_COMMIT_REF_SLUG}" \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --label "org.opencontainers.image.source=${CI_PROJECT_URL}" \
        app/
    - docker push "${ECR_REPO}:${IMAGE_TAG}"
    - docker push "${ECR_REPO}:${CI_COMMIT_REF_SLUG}"
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "${ECR_REPO}:${IMAGE_TAG}" "${ECR_REPO}:cache"
        docker push "${ECR_REPO}:cache"
      fi
    - echo "IMAGE_TAG=${IMAGE_TAG}" >> build.env
    - echo "ECR_REPO=${ECR_REPO}" >> build.env
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 1 day

# ── STAGE 5: Deploy ───────────────────────────────────────────

deploy:dev:
  stage: deploy
  image: hashicorp/terraform:1.6.6
  before_script:
    - apk add --no-cache git aws-cli --quiet
    - aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
    - aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
    - aws configure set region $AWS_REGION
    - git clone --depth=1 $INFRA_REPO infra
    - cd infra/terraform
    - export TF_VAR_datadog_api_key=$DATADOG_API_KEY
    - export TF_VAR_datadog_app_key=$DATADOG_APP_KEY
    - export TF_VAR_app_image_tag=$IMAGE_TAG
  script:
    - terraform init
    - terraform apply \
        -var-file=environments/dev/terraform.tfvars \
        -var="app_image_tag=${IMAGE_TAG}"
    - echo "ALB_DNS=$(terraform output -raw alb_dns_name)" >> $CI_PROJECT_DIR/deploy.env
    - echo "ECS_CLUSTER=$(terraform output -raw ecs_cluster_name)" >> $CI_PROJECT_DIR/deploy.env
    - echo "ECS_SERVICE=$(terraform output -raw ecs_service_name)" >> $CI_PROJECT_DIR/deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
    expire_in: 1 day
  environment:
    name: dev
    url: http://$ALB_DNS
  dependencies:
    - build:docker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    - if: $CI_COMMIT_BRANCH != "main"
      when: manual

# ── STAGE 6: Verify ───────────────────────────────────────────

verify:smoke-test:
  stage: verify
  image: alpine:latest
  before_script:
    - apk add --no-cache curl --quiet
  script:
    - echo "⏳ Waiting for the service to stabilize..."
    - sleep 30
    - |
      RETRIES=5
      for i in $(seq 1 $RETRIES); do
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://${ALB_DNS}:8080/health")
        if [ "$STATUS" = "200" ]; then
          echo "✅ Smoke test passed (HTTP $STATUS)"
          exit 0
        fi
        echo "⚠️  Attempt $i/$RETRIES — HTTP $STATUS, waiting 15s..."
        sleep 15
      done
      echo "❌ Smoke test failed after $RETRIES attempts"
      exit 1
  dependencies:
    - deploy:dev
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

verify:notify-datadog:
  stage: verify
  image: alpine:latest
  before_script:
    - apk add --no-cache curl --quiet
  script:
    - |
      curl -s -X POST "https://api.datadoghq.com/api/v1/events" \
        -H "Content-Type: application/json" \
        -H "DD-API-KEY: ${DATADOG_API_KEY}" \
        -d "{
          \"title\": \"Deploy — production-ready-ecs-app [dev]\",
          \"text\": \"Commit: ${CI_COMMIT_SHORT_SHA} by ${GITLAB_USER_LOGIN}\nMessage: ${CI_COMMIT_MESSAGE}\",
          \"priority\": \"normal\",
          \"tags\": [
            \"env:dev\",
            \"service:production-ready-ecs-app\",
            \"version:${IMAGE_TAG}\",
            \"source:gitlab-ci\"
          ],
          \"alert_type\": \"info\"
        }"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"